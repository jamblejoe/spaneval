name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0
        with:
          pixi-version: latest
          cache: true
          environments: default

      - name: Test
        run: pixi run test
