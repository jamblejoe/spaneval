[project]
name = "spaneval"
description = "Evaluation library for span-level entity extraction"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[pypi-dependencies]
spaneval = { path = ".", editable = true }

[dependencies]
python = ">=3.11"
tabulate = ">=0.9.0,<0.10"

[feature.dev.dependencies]
psutil = ">=7.2.2,<8"
ipykernel = ">=7.2.0,<8"

[feature.test.dependencies]
pytest = ">=6"
pytest-cov = "*"
[feature.test.tasks]
test = "pytest"

[feature.dspy.pypi-dependencies]
dspy = ">=3.1.3, <4"
litellm = "<=1.82.6"
python-dotenv = ">=1.0"
datasets = ">=2.0"

[environments]
default = ["test", "dev"]
dspy = ["dspy", "dev"]
