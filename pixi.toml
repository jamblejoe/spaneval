[project]
name = "spaneval"
description = "Evaluation library for span-level entity extraction"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[pypi-dependencies]
spaneval = { path = ".", editable = true }

[dependencies]
python = ">=3.11"
tabulate = ">=0.9.0,<0.10"

[feature.dev.dependencies]
psutil = ">=7.2.2,<8"
ipykernel = ">=7.2.0,<8"

[feature.test.dependencies]
pytest = ">=6"
pytest-cov = "*"
[feature.test.tasks]
test = "pytest"

[environments]
default = ["test", "dev"]
